<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Мои финансы</title>
  <meta name="description" content="Учёт вкладов, накоплений, зарплаты и трат с графиками — данные хранятся локально на устройстве" />
  <meta name="theme-color" content="#4f7cff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Финансы" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Мои финансы</h1>
    <div class="header-actions">
      <button id="export-btn" class="btn" type="button">Экспорт JSON</button>
      <button id="import-btn" class="btn" type="button">Импорт JSON</button>
      <input id="import-input" type="file" accept="application/json" hidden />
    </div>
  </header>

  <nav id="tab-nav" class="tab-nav"></nav>

  <main id="view" class="view"></main>

  <footer class="app-footer">
    <p class="muted small">
      Данные хранятся локально в этом браузере. Используйте «Экспорт JSON» / «Импорт JSON»,
      чтобы перенести их на другое устройство.
    </p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
